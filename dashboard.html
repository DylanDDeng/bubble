<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      background-image: radial-gradient(circle at 1px 1px, #334155 1px, transparent 0);
      background-size: 24px 24px;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #60a5fa; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid #334155;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #60a5fa;
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.15), 0 10px 40px rgba(0,0,0,0.3);
    }
    .card h2 { font-size: 1.1rem; color: #94a3b8; margin-bottom: 0.75rem; }
    .card .value { font-size: 2rem; font-weight: 700; color: #f8fafc; }
    .status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }
    .status.ok { background: #064e3b; color: #34d399; }
    .status.warn { background: #451a03; color: #fbbf24; }
    .footer {
      margin-top: 2rem;
      text-align: center;
      color: #64748b;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Project Dashboard</h1>
    <div class="grid">
      <div class="card">
        <h2>Total Files</h2>
        <div class="value">42</div>
        <span class="status ok">Healthy</span>
      </div>
      <div class="card">
        <h2>Last Commit</h2>
        <div class="value">2h ago</div>
        <span class="status ok">On track</span>
      </div>
      <div class="card">
        <h2>Open Tasks</h2>
        <div class="value">7</div>
        <span class="status warn">Needs attention</span>
      </div>
      <div class="card">
        <h2>Coverage</h2>
        <div class="value">68%</div>
        <span class="status warn">Improving</span>
      </div>
    </div>
    <div class="footer">
      Generated by Bubble Agent
    </div>
  </div>
</body>
</html>
